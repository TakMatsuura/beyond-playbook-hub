<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex">
<title>PLAYBOOK ─ 3動物ロゴ＋太字</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bodoni+Moda:wght@500;600;700;800&family=Cormorant+Garamond:ital,wght@0,600;0,700;1,600;1,700&family=Inter:wght@500;600;700&family=Noto+Serif+JP:wght@600;700;900&display=swap" rel="stylesheet">
<style>
:root{
  --ink:#0a0a0a; --gold:#c9a961; --gold-bright:#e8c474; --gold-deep:#8b7a3c;
  --gold-line:rgba(201,169,97,0.32);
  --c-flow:#d4a843; --c-surge:#e07c33; --c-seed:#87a847;
  --c-north:#6a4a8b; --c-lens:#4a3d80; --c-beacon:#b86528;
  --c-pack:#4a6d3a; --c-gear:#8a8a92; --c-magnet:#2c5d8f;
}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--ink);color:#e8e4da;font-family:'Inter',sans-serif;padding:30px 16px 90px}
.page-h{text-align:center;margin:6px auto 14px;max-width:820px}
.page-h h1{font-family:'Bodoni Moda',serif;color:var(--gold-bright);font-size:clamp(20px,3.2vw,30px);font-weight:600;letter-spacing:.04em}
.page-h p{color:#7d7870;margin-top:12px;font-size:13px;line-height:1.85}
.page-h b{color:var(--gold-bright)}
.toggle{display:flex;gap:8px;justify-content:center;margin:18px 0 0;flex-wrap:wrap}
.toggle button{background:none;border:1px solid var(--gold-line);color:var(--gold-bright);
  font-family:'Cormorant Garamond',serif;font-style:italic;font-size:13.5px;padding:6px 16px;border-radius:3px;cursor:pointer}
.toggle button.on{background:var(--gold);color:var(--ink)}

.orbit-stage{position:relative;width:min(94vw,820px);height:min(94vw,820px);margin:6px auto 0;--r:clamp(190px,34vw,308px)}
.orbit-ring{position:absolute;top:50%;left:50%;width:calc(var(--r)*2);height:calc(var(--r)*2);
  transform:translate(-50%,-50%);border:1px solid var(--gold-line);border-radius:50%}
.orbit-ring-2{width:calc(var(--r)*2 + 30px);height:calc(var(--r)*2 + 30px);border-style:dashed;border-color:rgba(201,169,97,0.12)}
.orbit-spinner{position:absolute;top:50%;left:50%;width:0;height:0;animation:orbitSpin 16s linear infinite;z-index:6}
.orbit-ball{position:absolute;left:0;top:0;width:16px;height:16px;border-radius:50%;
  transform:translate(-50%,-50%) translateY(calc(-1*var(--r)));
  background:radial-gradient(circle at 34% 30%,var(--gold-bright),var(--gold) 45%,var(--gold-deep));
  box-shadow:0 0 14px 3px rgba(201,169,97,0.55),0 0 4px 1px rgba(232,196,116,0.9)}
@keyframes orbitSpin{to{transform:rotate(360deg)}}
.orbit-core{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);
  width:clamp(120px,19vw,156px);height:clamp(120px,19vw,156px);border-radius:50%;z-index:5;
  display:flex;flex-direction:column;align-items:center;justify-content:center;gap:5px;
  background:radial-gradient(circle at 38% 32%,#2c2c30 0%,#161616 46%,#050505 100%);
  box-shadow:inset 0 0 38px rgba(0,0,0,.85),0 0 54px rgba(201,169,97,.14),0 0 0 1px var(--gold-line)}
.orbit-core-label{font-family:'Bodoni Moda',serif;font-weight:700;font-size:clamp(12px,1.8vw,15px);letter-spacing:.12em;color:var(--gold-bright)}
.orbit-core-book{width:clamp(40px,6.8vw,50px);height:auto;color:var(--gold-bright);opacity:.95}
.orbit-node{position:absolute;top:50%;left:50%;width:188px;z-index:4;
  transform:translate(-50%,-50%) rotate(var(--ang)) translateY(calc(-1*var(--r))) rotate(calc(-1*var(--ang)));
  text-align:center;padding:6px}
.on-name{display:block;font-family:'Cormorant Garamond',serif;font-style:italic;font-weight:700;font-size:33px;color:var(--c);letter-spacing:.04em;line-height:1.05}
.on-theme{display:block;font-size:14px;font-weight:600;color:#dcd7cb;margin-top:5px;line-height:1.4}
.on-status{display:inline-block;margin-top:7px;font-family:'Inter',sans-serif;font-weight:700;font-size:8.5px;letter-spacing:.22em;padding:2px 9px;border-radius:2px;text-transform:uppercase;background:var(--c);color:var(--ink)}

.orbit-div{position:absolute;inset:0;width:100%;height:100%;pointer-events:none;z-index:2;overflow:visible}
.orbit-div line{stroke:var(--gold-line);stroke-width:1;fill:none}
.d-arc path{stroke:rgba(201,169,97,0.6);stroke-width:1.4;fill:none}

.orbit-glow{position:absolute;top:50%;left:50%;width:calc(var(--r)*1.52);height:calc(var(--r)*1.12);
  border-radius:50%;z-index:0;pointer-events:none;opacity:.42;
  background:radial-gradient(ellipse at center, var(--tc) 0%, var(--tc) 16%, transparent 70%);
  transform:translate(-50%,-50%) rotate(var(--ang)) translateY(calc(-1*var(--r)*0.95)) rotate(calc(-1*var(--ang)))}

/* エリア＝PPT実物エンブレム（名称入り） */
.zlab{position:absolute;top:50%;left:50%;z-index:4;pointer-events:none;
  transform:translate(-50%,-50%) rotate(var(--ang)) translateY(calc(-1*var(--r) * 0.48)) rotate(calc(-1*var(--ang)))}
.zembl{display:block;height:124px;width:auto;filter:drop-shadow(0 3px 10px rgba(0,0,0,.55))}

body:not(.m-radial) .d-radial{display:none}
body:not(.m-arc):not(.m-fill) .d-arc{display:none}
body:not(.m-fill) .orbit-glow{display:none}
</style>
</head>
<body class="m-fill">

<div class="page-h">
  <h1>3つの型に「動物ロゴ」＋全文字を太く</h1>
  <p>PPTの動物エンブレムを線画で起こして各エリアに配置：<b>馬＝Execution / フクロウ＝Management / 鷲＝Operation</b>。<br>
  中央は PLAYBOOK（本）に戻し、文字も大きく太くしました。線画は仮版です（正式エンブレム画像があれば差し替え可）。</p>
  <div class="toggle">
    <button data-m="fill" class="on">③改 やわらか面（推奨）</button>
    <button data-m="radial">① 放射線</button>
    <button data-m="arc">② 外周アーク</button>
  </div>
</div>

<div class="orbit-stage" id="stage"></div>

<script>
const BOOK=`<svg class="orbit-core-book" viewBox="0 0 64 48" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M32 12 C 24 7 14 7 6 11 L 6 39 C 14 35 24 35 32 40"/><path d="M32 12 C 40 7 50 7 58 11 L 58 39 C 50 35 40 35 32 40"/><path d="M32 12 L 32 40"/><path d="M11 19 L 26 17 M11 25 L 26 23 M38 17 L 53 19 M38 23 L 53 25"/></svg>`;

// 馬（疾走＝Execution）
const HORSE=`<svg class="zanimal" viewBox="0 0 64 64" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
<path d="M21 56 L21 45 C15 42 12 35 15 28 C12 30 9 33 8 38 C5 28 11 18 22 14 C23 9 28 6 34 8 C45 11 51 22 50 34 C50 44 47 51 45 56 Z"/>
<path d="M34 8 C39 12 41 19 40 26 M30 12 C25 16 23 22 25 28"/>
<path d="M30 13 L33 6 L38 12"/>
<circle cx="40" cy="24" r="1.9" fill="currentColor" stroke="none"/></svg>`;

// フクロウ（叡智＝Management）
const OWL=`<svg class="zanimal" viewBox="0 0 64 64" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
<path d="M32 8 C18 8 12 19 12 33 C12 49 21 58 32 58 C43 58 52 49 52 33 C52 19 46 8 32 8 Z"/>
<path d="M19 12 L14 4 M45 12 L50 4"/>
<circle cx="24" cy="29" r="7.6"/><circle cx="40" cy="29" r="7.6"/>
<circle cx="24" cy="29" r="2" fill="currentColor" stroke="none"/><circle cx="40" cy="29" r="2" fill="currentColor" stroke="none"/>
<path d="M32 33 L29 38 L35 38 Z" fill="currentColor" stroke="none"/>
<path d="M19 42 C23 48 27 50 32 50 C37 50 41 48 45 42"/></svg>`;

// 鷲（翼を広げる＝Operation）
const EAGLE=`<svg class="zanimal" viewBox="0 0 64 64" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
<circle cx="32" cy="14" r="5"/>
<path d="M32 19 L29 24 L35 24 Z" fill="currentColor" stroke="none"/>
<path d="M30 25 C21 19 11 18 4 25 C10 25 12 28 10 32 C16 29 18 32 17 37 C22 33 26 36 26 41 L31 32"/>
<path d="M34 25 C43 19 53 18 60 25 C54 25 52 28 54 32 C48 29 46 32 47 37 C42 33 38 36 38 41 L33 32"/>
<path d="M30 32 L28 52 M32 32 L32 55 M34 32 L36 52"/></svg>`;

const GROUPS=[
 {img:'/img/exec.png',cls:'',en:'Execution Pack',tc:'#c9a961',ctr:0,svc:[
   {n:'FLOW', c:'var(--c-flow)', t:'お金の流れを、止めない。'},
   {n:'SURGE',c:'var(--c-surge)',t:'売上の天井を、突き破る。'},
   {n:'SEED', c:'var(--c-seed)', t:'次の事業の柱を、作る。'},
 ]},
 {img:'/img/mgmt.png',cls:'owl',en:'Management Studio',tc:'#6f6593',ctr:120,svc:[
   {n:'NORTH', c:'var(--c-north)', t:'会社の旗を、立てる。'},
   {n:'LENS',  c:'var(--c-lens)',  t:'判断のスピードを、上げる。'},
   {n:'BEACON',c:'var(--c-beacon)',t:'強みが、伝わる。'},
 ]},
 {img:'/img/oper.png',cls:'',en:'Operation Partner',tc:'#66794d',ctr:240,svc:[
   {n:'PACK',  c:'var(--c-pack)',  t:'人で勝つ組織を、作る。'},
   {n:'GEAR',  c:'var(--c-gear)',  t:'現場を、回し切る。'},
   {n:'MAGNET',c:'var(--c-magnet)',t:'人が集まる会社に、なる。'},
 ]},
];
const OFF=[-40,0,40];
const GAPS=[60,180,300];
const VB=820, C=VB/2;
const pt=(ang,R)=>[ (C+R*Math.sin(ang*Math.PI/180)).toFixed(1), (C-R*Math.cos(ang*Math.PI/180)).toFixed(1) ];

let radial=GAPS.map(g=>{const a=pt(g,118),b=pt(g,348);return `<line x1="${a[0]}" y1="${a[1]}" x2="${b[0]}" y2="${b[1]}"/>`}).join('');
let arcs=GROUPS.map(g=>{const a=pt(g.ctr-48,342),b=pt(g.ctr+48,342);return `<path d="M${a[0]} ${a[1]} A 342 342 0 0 1 ${b[0]} ${b[1]}"/>`}).join('');

let html='';
html+=GROUPS.map(g=>`<div class="orbit-glow" style="--ang:${g.ctr}deg;--tc:${g.tc}"></div>`).join('');
html+=`<div class="orbit-ring"></div><div class="orbit-ring orbit-ring-2"></div>`;
html+=`<svg class="orbit-div d-radial" viewBox="0 0 ${VB} ${VB}" preserveAspectRatio="xMidYMid meet">${radial}</svg>`;
html+=`<svg class="orbit-div d-arc" viewBox="0 0 ${VB} ${VB}" preserveAspectRatio="xMidYMid meet">${arcs}</svg>`;
html+=`<div class="orbit-core"><span style="display:flex;flex-direction:column;align-items:center;gap:5px">${BOOK}<span class="orbit-core-label">PLAYBOOK</span></span></div>`;
html+=`<div class="orbit-spinner"><span class="orbit-ball"></span></div>`;
GROUPS.forEach(g=>g.svc.forEach((s,i)=>{
  html+=`<a class="orbit-node" style="--ang:${g.ctr+OFF[i]}deg;--c:${s.c}"><span class="on-name">${s.n}</span><span class="on-theme">${s.t}</span><span class="on-status">Live</span></a>`;
}));
html+=GROUPS.map(g=>`<div class="zlab ${g.cls}" style="--ang:${g.ctr}deg"><img class="zembl" src="${g.img}?t=4" alt="${g.en}"></div>`).join('');

document.getElementById('stage').innerHTML=html;
document.querySelectorAll('.toggle button').forEach(b=>b.onclick=()=>{
  document.body.className='m-'+b.dataset.m;
  document.querySelectorAll('.toggle button').forEach(x=>x.classList.toggle('on',x===b));
});
</script>
</body>
</html>
