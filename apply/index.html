<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex">
<meta name="description" content="BEYOND PLAYBOOK お問合せフォーム。関心のあるサービスを選んでお送りください。1時間以内に折り返します。">
<meta property="og:image" content="https://playbook.beyond-holdings.co.jp/assets/og-image.png">
<meta name="twitter:card" content="summary_large_image">
<title>お問合せ｜BEYOND PLAYBOOK</title>
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' rx='10' fill='%230a0a0a'/><text x='50' y='72' font-family='Bodoni Moda,serif' font-weight='700' font-size='66' fill='%23c9a961' text-anchor='middle' letter-spacing='-2'>P</text></svg>">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bodoni+Moda:wght@500;600;700&family=Inter:wght@400;500;600;700&family=Noto+Serif+JP:wght@400;500;600;700&family=Shippori+Mincho+B1:wght@400;500;600;700&display=swap" rel="stylesheet">
<script async src="https://www.googletagmanager.com/gtag/js?id=G-PJY2SKCX2L"></script>
<script>window.dataLayer=window.dataLayer||[];function gtag(){dataLayer.push(arguments);}gtag('js',new Date());gtag('config','G-PJY2SKCX2L');</script>
<style>
:root{
  --ink:#0a0a0a; --ink-soft:#15161c; --paper:#f4efe1;
  --gold:#c9a961; --gold-bright:#e8c474; --gold-deep:#8b7a3c; --gold-line:rgba(201,169,97,0.32);
  --text:#e8e5dc; --text-soft:rgba(232,229,220,0.62); --text-mute:rgba(232,229,220,0.4);
  --red:#d98a8a; --green:#8fcf9f;
}
*{box-sizing:border-box;margin:0;padding:0;}
html{-webkit-font-smoothing:antialiased;}
body{font-family:'Shippori Mincho B1','Noto Serif JP',serif; color:var(--text); background:radial-gradient(ellipse at 50% 0%,#0d0d10 0%,#0a0a0a 55%,#050505 100%); line-height:1.9; font-size:15px; min-height:100vh; display:flex; flex-direction:column;}
a{color:inherit; text-decoration:none;}

header{background:linear-gradient(180deg,rgba(10,10,10,0.92),rgba(10,10,10,0.6)); border-bottom:1px solid var(--gold-line); position:sticky; top:0; z-index:10; backdrop-filter:blur(6px);}
.header-inner{display:flex; align-items:center; justify-content:space-between; padding:18px 24px; max-width:1080px; margin:0 auto;}
.logo{display:flex; align-items:center; gap:14px;}
.logo .brand-logo{height:24px; width:auto; filter:brightness(0) invert(0.85) sepia(0.7) saturate(2) hue-rotate(15deg); opacity:0.9;}
.logo .brand-name{font-family:'Bodoni Moda',serif; font-weight:500; font-size:21px; letter-spacing:0.06em; color:var(--gold); padding-left:14px; border-left:1px solid var(--gold-line); line-height:1;}
.back-link{font-family:'Inter',sans-serif; font-size:12px; letter-spacing:0.1em; color:var(--text-soft);}
.back-link:hover{color:var(--gold-bright);}

main{flex:1; max-width:680px; margin:0 auto; padding:64px 24px 90px; width:100%;}
.page-meta{font-family:'Inter',sans-serif; font-weight:500; font-size:12px; letter-spacing:0.35em; color:var(--gold); text-transform:uppercase; margin-bottom:14px;}
h1{font-family:'Bodoni Moda','Noto Serif JP',serif; font-weight:500; font-size:clamp(30px,5vw,44px); line-height:1.3; margin-bottom:18px; color:var(--text); letter-spacing:0.03em;}
.lead{font-size:15px; color:var(--text-soft); margin-bottom:40px; padding-bottom:28px; border-bottom:1px solid var(--gold-line); line-height:2.05;}
.lead strong{color:var(--gold-bright); font-weight:600;}

form{background:linear-gradient(180deg,rgba(255,255,255,0.02),transparent); border:1px solid var(--gold-line); padding:36px;}
.fld{margin-bottom:24px;}
.fld label{display:block; font-family:'Inter',sans-serif; font-size:12px; font-weight:600; letter-spacing:0.08em; color:var(--gold); margin-bottom:10px;}
.fld .req{color:var(--red); margin-left:4px;}
.fld input, .fld select, .fld textarea{
  width:100%; padding:13px 15px; border:1px solid var(--gold-line); border-radius:0;
  font-size:15px; font-family:'Shippori Mincho B1','Noto Serif JP',serif; background:rgba(255,255,255,0.03);
  color:var(--text); line-height:1.6; transition:border-color 0.2s, box-shadow 0.2s;
}
.fld select option{background:#15161c; color:var(--text);}
.fld input::placeholder, .fld textarea::placeholder{color:var(--text-mute);}
.fld input:focus, .fld select:focus, .fld textarea:focus{outline:none; border-color:var(--gold); box-shadow:0 0 0 3px rgba(201,169,97,0.14);}
.fld textarea{min-height:120px; resize:vertical;}
.fld .hint{font-size:12px; color:var(--text-mute); margin-top:7px; line-height:1.7;}

.interests-grid{display:grid; grid-template-columns:repeat(auto-fit, minmax(200px,1fr)); gap:10px;}
.interest{display:block; cursor:pointer; padding:13px 15px; border:1px solid var(--gold-line); background:rgba(255,255,255,0.02); transition:all 0.2s; position:relative;}
.interest input{position:absolute; opacity:0; pointer-events:none;}
.interest:hover{border-color:var(--gold); background:rgba(201,169,97,0.05);}
.interest.checked{border-color:var(--gold-bright); background:rgba(201,169,97,0.1);}
.interest .iname{font-family:'Cormorant Garamond','Bodoni Moda',serif; font-style:italic; font-weight:600; font-size:17px; color:var(--gold-bright); margin-bottom:2px; letter-spacing:0.02em;}
.interest .itheme{font-size:11.5px; color:var(--text-soft); line-height:1.5;}
.interest .ilive{display:inline-block; font-family:'Inter',sans-serif; font-size:8px; font-weight:700; letter-spacing:0.15em; padding:2px 6px; background:var(--gold); color:var(--ink); margin-left:7px; vertical-align:middle;}

.submit-btn{
  width:100%; padding:19px; border:none; cursor:pointer; margin-top:6px;
  background:linear-gradient(135deg,var(--gold-deep),var(--gold-bright),var(--gold));
  color:var(--ink); font-family:'Inter',sans-serif; font-size:14px; font-weight:600; letter-spacing:0.2em;
  text-transform:uppercase; transition:all 0.3s;
}
.submit-btn:hover{transform:translateY(-2px); box-shadow:0 16px 34px rgba(201,169,97,0.22);}
.submit-btn:disabled{opacity:0.5; cursor:not-allowed; transform:none;}

#msg{margin-top:18px; padding:14px; font-size:14px; line-height:1.7; display:none;}
#msg.ok{background:rgba(143,207,159,0.1); color:var(--green); border:1px solid rgba(143,207,159,0.4); display:block;}
#msg.ng{background:rgba(217,138,138,0.1); color:var(--red); border:1px solid rgba(217,138,138,0.4); display:block;}

.note{font-size:12px; color:var(--text-mute); margin-top:20px; padding-top:20px; border-top:1px solid var(--gold-line); line-height:1.9;}
.note a{color:var(--gold); text-decoration:underline;}

footer{background:#070707; color:var(--text-soft); padding:34px 24px; font-family:'Inter',sans-serif; font-size:12px; letter-spacing:0.06em; text-align:center; border-top:1px solid var(--gold-line);}
footer a{color:var(--text-soft);}
footer a:hover{color:var(--gold-bright);}

@media (max-width:560px){ form{padding:24px 18px;} .interests-grid{grid-template-columns:1fr;} }
</style>
</head>
<body>

<header>
  <div class="header-inner">
    <a href="/" class="logo">
      <img src="/assets/beyond_logo.png" alt="BEYOND Holdings" class="brand-logo">
      <span class="brand-name">Playbook</span>
    </a>
    <a href="/" class="back-link">← トップへ戻る</a>
  </div>
</header>

<main>
  <div class="page-meta">Contact</div>
  <h1>お問合せ</h1>
  <p class="lead">
    関心のあるサービス・現在の課題をお聞かせください。<br>
    <strong>1時間以内に折り返し</strong>、 <strong>3営業日以内に初回ヒアリング</strong>をお取りします。
  </p>

  <form id="contactForm">
    <div class="fld">
      <label>お名前<span class="req">*</span></label>
      <input type="text" name="name" required maxlength="60" autocomplete="name">
    </div>

    <div class="fld">
      <label>会社名<span class="req">*</span></label>
      <input type="text" name="company" required maxlength="80" autocomplete="organization">
    </div>

    <div class="fld">
      <label>業種</label>
      <select name="industry">
        <option value="">選択してください (任意)</option>
        <option>製造業</option>
        <option>建設業</option>
        <option>卸売・小売業</option>
        <option>サービス業</option>
        <option>IT・通信</option>
        <option>不動産・建築</option>
        <option>飲食・宿泊</option>
        <option>運輸・物流</option>
        <option>美容・健康</option>
        <option>その他</option>
      </select>
    </div>

    <div class="fld">
      <label>年商規模</label>
      <select name="revenue">
        <option value="">選択してください (任意)</option>
        <option>1億円未満</option>
        <option>1〜3億円</option>
        <option>3〜10億円</option>
        <option>10〜30億円</option>
        <option>30億円以上</option>
      </select>
    </div>

    <div class="fld">
      <label>関心のあるサービス<span style="font-weight:400; color:var(--text-mute); margin-left:6px;">(複数選択可)</span></label>
      <div class="interests-grid">
        <label class="interest"><input type="checkbox" name="interests" value="FLOW"><div class="iname">FLOW<span class="ilive">LIVE</span></div><div class="itheme">財務・資金繰り・銀行交渉</div></label>
        <label class="interest"><input type="checkbox" name="interests" value="SURGE"><div class="iname">SURGE</div><div class="itheme">売上の天井を破る</div></label>
        <label class="interest"><input type="checkbox" name="interests" value="MAGNET"><div class="iname">MAGNET</div><div class="itheme">選ばれる会社になる</div></label>
        <label class="interest"><input type="checkbox" name="interests" value="PACK"><div class="iname">PACK</div><div class="itheme">人で勝つ組織を作る</div></label>
        <label class="interest"><input type="checkbox" name="interests" value="GEAR"><div class="iname">GEAR</div><div class="itheme">現場を回し切る</div></label>
        <label class="interest"><input type="checkbox" name="interests" value="LENS"><div class="iname">LENS</div><div class="itheme">判断のスピードを上げる</div></label>
        <label class="interest"><input type="checkbox" name="interests" value="NORTH"><div class="iname">NORTH</div><div class="itheme">会社の旗を立てる</div></label>
        <label class="interest"><input type="checkbox" name="interests" value="BEACON"><div class="iname">BEACON</div><div class="itheme">強みが伝わる会社</div></label>
        <label class="interest"><input type="checkbox" name="interests" value="SEED"><div class="iname">SEED</div><div class="itheme">次の事業の柱を作る</div></label>
        <label class="interest"><input type="checkbox" name="interests" value="UNSURE"><div class="iname">迷っている</div><div class="itheme">話して整理したい</div></label>
      </div>
    </div>

    <div class="fld">
      <label>ご連絡先<span class="req">*</span></label>
      <input type="text" name="contact" required maxlength="120" placeholder="メールアドレス / 電話番号 / LINE ID 等">
    </div>

    <div class="fld">
      <label>ご希望の連絡方法</label>
      <select name="contact_method">
        <option value="">指定なし</option>
        <option>メール</option>
        <option>電話</option>
        <option>LINE</option>
        <option>LINE WORKS</option>
        <option>Zoom等オンライン会議</option>
      </select>
    </div>

    <div class="fld">
      <label>ご相談内容</label>
      <textarea name="message" maxlength="2000" placeholder="現在の状況・課題・聞きたいこと等、自由にご記入ください (任意)"></textarea>
      <div class="hint">詳細はヒアリング時にお伺いするので、ここはサマリで十分です。</div>
    </div>

    <button type="submit" class="submit-btn" data-track="cta_contact_submit">送信する</button>
    <div id="msg"></div>

    <div class="note">
      送信いただいた情報は、 <a href="/privacy/">プライバシーポリシー</a> に従って取り扱います。<br>
      1時間以内に折り返し、受付確認のご連絡をお送りします。
    </div>
  </form>
</main>

<footer>
  © 2026 BEYOND Holdings 株式会社 &nbsp;─&nbsp; <a href="/">PLAYBOOK トップ</a> &nbsp;─&nbsp; <a href="/privacy/">プライバシー</a>
</footer>

<script>
// チェックボックス見た目連動
document.querySelectorAll('.interest input').forEach(function(i){
  i.addEventListener('change', function(){
    i.closest('.interest').classList.toggle('checked', i.checked);
  });
});

// LP由来のサービスを自動選択 (例: /apply/?s=surge → 関心サービスにSURGEを自動ON)
(function(){
  var s = new URLSearchParams(location.search).get('s');
  if (!s) return;
  var cb = document.querySelector('.interest input[value="' + s.toUpperCase() + '"]');
  if (cb) { cb.checked = true; cb.closest('.interest').classList.add('checked'); }
})();

document.getElementById('contactForm').addEventListener('submit', async function(e){
  e.preventDefault();
  var f = e.target;
  var btn = f.querySelector('.submit-btn');
  var msg = document.getElementById('msg');
  msg.style.display = 'none'; msg.className = '';
  btn.disabled = true; btn.textContent = '送信中...';

  var fd = new FormData(f);
  var data = {};
  fd.forEach(function(v, k){
    if (k === 'interests') {
      if (!data.interests) data.interests = [];
      data.interests.push(v);
    } else {
      data[k] = String(v).trim();
    }
  });

  try {
    var res = await fetch('/api/submit', {
      method:'POST', headers:{'Content-Type':'application/json'},
      body: JSON.stringify(data),
    });
    var ct = res.headers.get('content-type') || '';
    var body = ct.indexOf('json') >= 0 ? await res.json() : {};
    if (res.ok && body.ok) {
      msg.className = 'ok';
      msg.textContent = '✓ お問合せを受け付けました。1時間以内に折り返します。';
      f.reset();
      document.querySelectorAll('.interest.checked').forEach(function(x){ x.classList.remove('checked'); });
      if (typeof gtag === 'function') gtag('event','contact_submit_success', { interests: (data.interests||[]).join('|') });
    } else {
      msg.className = 'ng';
      msg.textContent = '✗ ' + (body.error || '送信に失敗しました。少し時間を置いてお試しください。');
    }
  } catch (err) {
    msg.className = 'ng';
    msg.textContent = '✗ 通信エラーが発生しました: ' + err.message;
  }
  btn.disabled = false; btn.textContent = '送信する';
  if (msg.className) window.scrollTo({ top: msg.offsetTop - 100, behavior: 'smooth' });
});
</script>
</body>
</html>
