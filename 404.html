  background:linear-gradient(135deg,var(--gold-deep),var(--gold-bright) 50%,var(--gold));

  color:var(--gold-bright); border:1px solid var(--gold-line); text-decoration:none;
  transition:all 0.35s ease; text-transform:uppercase;
}
.link:hover{background:rgba(201,169,97,0.08); border-color:var(--gold);}
.link.primary{
  background:linear-gradient(135deg,var(--gold-deep),var(--gold-bright),var(--gold));

.link.primary:hover{transform:translateY(-2px); box-shadow:0 16px 34px rgba(201,169,97,0.22);}
