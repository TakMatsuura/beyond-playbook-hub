<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <radialGradient id="bg" cx="0.5" cy="0.42" r="0.7">
      <stop offset="0" stop-color="#14182b"/>
      <stop offset="0.7" stop-color="#0a0a0a"/>
      <stop offset="1" stop-color="#0a0a0a"/>
    </radialGradient>
    <linearGradient id="gold" x1="0" y1="0" x2="1" y2="0.5">
      <stop offset="0" stop-color="#8b7a3c"/>
      <stop offset="0.45" stop-color="#e8c474"/>
      <stop offset="0.75" stop-color="#c9a961"/>
      <stop offset="1" stop-color="#8b7a3c"/>
    </linearGradient>
    <linearGradient id="goldLine" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#c9a961" stop-opacity="0"/>
      <stop offset="0.5" stop-color="#c9a961" stop-opacity="0.5"/>
      <stop offset="1" stop-color="#c9a961" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <!-- 背景 -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- 古い洋書の四隅装飾 -->
  <g stroke="#c9a961" stroke-width="1" fill="none" opacity="0.4">
    <path d="M 50 110 L 50 50 L 110 50"/>
    <path d="M 1090 50 L 1150 50 L 1150 110"/>
    <path d="M 50 520 L 50 580 L 110 580"/>
    <path d="M 1150 520 L 1150 580 L 1090 580"/>
  </g>

  <!-- 上下のゴールド細線 -->
  <line x1="100" y1="100" x2="1100" y2="100" stroke="url(#goldLine)" stroke-width="1"/>
  <line x1="100" y1="530" x2="1100" y2="530" stroke="url(#goldLine)" stroke-width="1"/>

  <!-- BEYOND Holdings eyebrow -->
  <text x="600" y="150" font-family="Inter, sans-serif" font-weight="500" font-size="14" fill="#8b7a3c" text-anchor="middle" letter-spacing="6">BEYOND HOLDINGS · OPERATING SYSTEM</text>

  <!-- PLAYBOOK 大文字タイトル -->
  <text x="600" y="310" font-family="Cormorant Garamond, Georgia, serif" font-style="italic" font-weight="600" font-size="160" fill="url(#gold)" text-anchor="middle" letter-spacing="4">Playbook</text>

  <!-- 中央オーナメント (line - diamond - line) -->
  <line x1="490" y1="360" x2="560" y2="360" stroke="#c9a961" stroke-width="1" opacity="0.5"/>
  <rect x="595" y="354" width="12" height="12" fill="#e8c474" transform="rotate(45 601 360)"/>
  <line x1="640" y1="360" x2="710" y2="360" stroke="#c9a961" stroke-width="1" opacity="0.5"/>

  <!-- メインコピー -->
  <text x="600" y="420" font-family="'Noto Serif JP', serif" font-weight="500" font-size="46" fill="#e8e5dc" text-anchor="middle" letter-spacing="8">中小企業を、<tspan font-weight="700" fill="#e8c474">加速する</tspan>。</text>

  <!-- サブコピー -->
  <text x="600" y="470" font-family="'Noto Serif JP', serif" font-weight="400" font-size="18" fill="#a09a8c" text-anchor="middle" letter-spacing="4">3 層 × 9 サービスで、経営の手を切らさない</text>

  <!-- 下部ブランド -->
  <text x="600" y="570" font-family="Cormorant Garamond, Georgia, serif" font-style="italic" font-weight="500" font-size="14" fill="#8b7a3c" text-anchor="middle" letter-spacing="6">— BEYOND Holdings 株式会社 —</text>
</svg>
