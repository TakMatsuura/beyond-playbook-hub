<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#060b1a"/>
      <stop offset="0.6" stop-color="#0a1e3d"/>
      <stop offset="1" stop-color="#060b1a"/>
    </linearGradient>
    <linearGradient id="gold" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#a07d2c"/>
      <stop offset="0.5" stop-color="#f5c542"/>
      <stop offset="1" stop-color="#d4a843"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- 9つの点で「9サービス」 を表現 -->
  <g opacity="0.18">
    <circle cx="150" cy="160" r="4" fill="#f5c542"/>
    <circle cx="270" cy="120" r="3" fill="#f5c542"/>
    <circle cx="380" cy="170" r="4" fill="#f5c542"/>
    <circle cx="820" cy="140" r="3" fill="#f5c542"/>
    <circle cx="930" cy="180" r="4" fill="#f5c542"/>
    <circle cx="1050" cy="120" r="3" fill="#f5c542"/>
    <circle cx="180" cy="500" r="3" fill="#f5c542"/>
    <circle cx="950" cy="480" r="4" fill="#f5c542"/>
    <circle cx="1080" cy="520" r="3" fill="#f5c542"/>
  </g>

  <!-- 中央光リング -->
  <circle cx="600" cy="315" r="240" fill="none" stroke="url(#gold)" stroke-width="1" opacity="0.3"/>
  <circle cx="600" cy="315" r="180" fill="none" stroke="url(#gold)" stroke-width="1" opacity="0.5"/>

  <!-- PLAYBOOKロゴ -->
  <text x="600" y="280" font-family="Inter, Arial, sans-serif" font-weight="900" font-size="120" fill="url(#gold)" text-anchor="middle" letter-spacing="6">PLAYBOOK</text>

  <!-- 区切り線 -->
  <line x1="450" y1="320" x2="750" y2="320" stroke="#d4a843" stroke-width="1" opacity="0.5"/>

  <!-- メインコピー -->
  <text x="600" y="380" font-family="'Noto Sans JP', sans-serif" font-weight="900" font-size="60" fill="#ffffff" text-anchor="middle" letter-spacing="6">中小企業を、加速する。</text>

  <!-- サブコピー -->
  <text x="600" y="445" font-family="'Noto Sans JP', sans-serif" font-weight="500" font-size="22" fill="#e5e3dc" text-anchor="middle" letter-spacing="3">9つのサービスで、経営の打ち手を切らさない</text>

  <!-- 下部ブランド -->
  <text x="600" y="570" font-family="Inter, Arial, sans-serif" font-weight="600" font-size="20" fill="#a07d2c" text-anchor="middle" letter-spacing="6">BEYOND PLAYBOOK</text>
  <text x="600" y="600" font-family="'Noto Sans JP', sans-serif" font-weight="400" font-size="16" fill="#9e958a" text-anchor="middle" letter-spacing="2">BEYOND Holdings 株式会社</text>
</svg>
