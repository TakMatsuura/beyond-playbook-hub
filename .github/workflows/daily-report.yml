name: Daily Report

on:
  schedule:
    # 毎日 22:00 UTC = 翌朝 7:00 JST
    - cron: '0 22 * * *'
  workflow_dispatch:
    inputs:
      date:
        description: '集計対象日 (YYYY-MM-DD・JST)。空欄=前日'
        required: false
        default: ''
      dry_run:
        description: 'DMを送らず内容だけ確認 (1=dry-run)'
        required: false
        default: ''

jobs:
  send:
    runs-on: ubuntu-latest
    steps:
      - name: Send daily report
        env:
          DAILY_REPORT_KEY: ${{ secrets.DAILY_REPORT_KEY }}
          REPORT_DATE: ${{ inputs.date }}
          DRY_RUN: ${{ inputs.dry_run }}
        run: |
          if [ -z "$DAILY_REPORT_KEY" ]; then
            echo "::error::DAILY_REPORT_KEY secret is missing"
            exit 1
          fi
          q="key=${DAILY_REPORT_KEY}"
          [ -n "$REPORT_DATE" ] && q="${q}&date=${REPORT_DATE}"
          [ -n "$DRY_RUN" ] && q="${q}&dry_run=${DRY_RUN}"
          status=$(curl -sS -w "%{http_code}" -o /tmp/resp.json "https://playbook.beyond-holdings.co.jp/api/daily-report?${q}")
          echo "HTTP: $status"
          cat /tmp/resp.json
          test "$status" = "200"
